<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>线性代数图谱-知识点面板加宽一半</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f5f7fa;font-family:"Microsoft Yahei",sans-serif;overflow:hidden}
        #container{width:100vw;height:100vh;position:relative}
        #canvas{width:100%;height:100%;position:absolute;top:0;left:0}
        /* 主节点：缩小圆形、适中字体 */
        .node-main{
            position:absolute;
            width:110px;
            height:110px;
            border-radius:9999px; /* 完美正圆 */
            box-shadow:0 3px 10px rgba(0,0,0.2);
            cursor:move;
            user-select:none;
            font-size:15px;
            font-weight:bold;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            transition:0.2s;
            z-index:10;
            color:#fff;
            padding:8px;
            line-height:1.3;
        }
        .node-main:hover{transform:scale(1.05)}
        /* 子节点：小圆、放大字体不变 */
        .node-child{
            position:absolute;
            width:100px;
            height:100px;
            border-radius:9999px;
            box-shadow:0 1px 5px rgba(0,0,0,0.12);
            cursor:move;
            user-select:none;
            font-size:14px;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            transition:0.2s;
            z-index:8;
            background:#eef2ff;
            color:#1a2448;
            padding:8px;
            line-height:1.2;
        }
        .node-child:hover{transform:scale(1.03)}
        /* 主节点配色 */
        .det{background:#192a88}
        .mat{background:#244999}
        .equ{background:#103494}
        .vec{background:#0c4291}
        .eig{background:#522b99}
        .svd{background:#203099}
        /* 连线画布 */
        svg#linkSvg{
            position:absolute;
            top:0;left:0;
            width:100%;height:100%;
            pointer-events:none;
            z-index:1;
        }
        /* 侧边知识点面板：原320px，加宽一半改为480px */
        #infoPanel{
            position:absolute;
            top:20px;right:20px;
            width:480px;
            background:#fff;
            padding:16px;
            border-radius:10px;
            box-shadow:0 2px 12px rgba(0,0,0,0.1);
            max-height:80vh;
            overflow-y:auto;
            z-index:99;
        }
        #infoPanel h3{margin-bottom:10px;color:#223}
        #infoPanel p{font-size:13px;line-height:1.6;color:#444}
        /* 知识点图片样式 */
        .node-img {
            margin: 12px 0 4px;
            max-width: 100%;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .img-desc-text {
            font-size:12px;
            color:#666;
            margin-bottom:8px;
        }
        /* 底部极简提示 */
        .tip{position:absolute;bottom:16px;left:16px;background:rgba(0,0,0.6);color:#fff;padding:8px 14px;border-radius:6px;font-size:12px}
    </style>
</head>
<body>
<div id="container">
    <svg id="linkSvg">
        <!-- 定义箭头标记 -->
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#445"/>
            </marker>
        </defs>
    </svg>
    <div id="canvas"></div>
    <div id="infoPanel">
        <h3>知识点详情</h3>
        <div id="detailContent"></div>
    </div>
    <div class="tip">点击节点查看详情 | 拖拽移动节点 | 滚轮缩放画布</div>
</div>

<script>
// 全局可调整配置
const CONFIG = {
    MAX_PER_ROW: 4,
    CHILD_GAP_X: 140,
    CHILD_GAP_Y: 100,
    // 行列式、向量组专用更大垂直间隔
    SPECIAL_CHILD_GAP_Y: 160,
    OFFSET_LEFT: 300,
    OFFSET_TOP: 260,
    OFFSET_RIGHT: 320,
    OFFSET_BOTTOM: 260,
    OFFSET_SE: 340,
    OFFSET_NW: 420,
    CURVE_OFFSET: 60
};

// 主节点数据
const graphData = {
    mainNodes: [
        {
            id:"det", 
            name:"行列式 |A|", 
            cls:"node-main det", 
            x:240, y:320,
            expandDir: "left",
            desc:`
<h4>行列式</h4>
<p>①其最开始就是为判断线性方程组解的情况诞生的</p>
<p>②其英文名是determinants，即可以决定方程组有没有解；</p>
<p>③其是一个标量</p>
<p>④人们后面发现这个行列式实际上是在求向量张开完整空间的体积。如果不能张开完整空间，则行列式为0</p>
`,
            imgUrl: "",
            imgDesc: "",
            childIds: ["det6","detExpand"],
            links: []
        },
        {
            id:"mat", 
            name:"矩阵 Ax=b", 
            cls:"node-main mat", 
            x:500, y:320,
            expandDir: "northwest",
            desc:`
<h4>矩阵</h4>
<p>①其最开始也是为了解线性方程组的，行列式判断有没有解必须要要求几个未知数，几个方程（对应方阵），如果不满足这个条件了？这时就引入了矩阵的概念。</p>
<p>②后面人们发现：矩阵可以用来描述向量的运动（方阵），也就是矩阵乘法的本质。从列向量的视角来看，矩阵乘法将一种列向量变成另外一个列向量，而且向量的维度可能不同</p>
`,
            imgUrl: "",
            imgDesc: "",
            childIds: ["matCalc","matMultNote","matTrans","matInv","rowStep","matRank"],
            links: [
                {target:"det", text:"方阵"},

        {
            id:"equ", 
            name:"线性方程组", 
            cls:"node-main equ", 
            x:340, y:470,
            expandDir: "right",
            desc:`
<h4>线性方程组 Ax=b</h4>
<p>1. 有无解判定：增广矩阵秩=系数矩阵秩才有解</p>
<p>2. 解结构：齐次通解+非齐次特解</p>
<p>3. 方程数≠未知数时：超定/欠定方程组</p>
`,
            imgUrl: "",
            imgDesc: "",
            childIds: [],
            links: [
                {target:"det", text:"判断有无解"},
                {target:"mat", text:"Ax=b"},
                {target:"vec", text:"解空间是向量空间"}
            ]
        },
        {
            id:"vec", 
            name:"向量组 [a₁,a₂…]", 
            cls:"node-main vec", 
            x:500, y:600,
            expandDir: "bottom",
            desc:`
<h4>向量组 & 向量空间</h4>
<p>1. 线性表示、线性相关/无关</p>
<p>2. 极大无关组：向量组的基底</p>
<p>3. 向量空间：所有向量线性组合构成集合</p>
<p>4. 矩阵列/行本质就是一组向量</p>
`,
            imgUrl: "",
            imgDesc: "",
            // 顺序：线性相关、最大无关组、向量组的秩、向量空间
            childIds: ["vecRel","vecMaxInd","vecGroup","vecSpace"],
            links: []
        },
        {
            id:"eig", 
            name:"特征值与特征向量", 
            cls:"node-main eig", 
            x:760, y:470,
            expandDir: "southeast",
            desc:`
<h4>特征值与特征向量</h4>
<p>①如果一个方阵很大，很大，我们怎么快速知道这个方阵起到的线性变换大概在干啥吗？</p>
<p>② 矩阵的特征值、特征向量就可以给我们提供这样的一个快速视角。</p>
<p>③ 特征向量即不随矩阵变换变化方向的向量，但会根据特征值进行相应尺度的缩放。</p>
<p>④ AI：“矩阵变换是以特征向量为“主轴”进行拉伸/压缩，但如果是非对称矩阵，这些主轴不一定互相垂直，变换里还藏着“扭转”的成分。”</p>
<p>即：当你想了解矩阵作为线性变换的特性的时候，你可以想象你现在有很多数据向量或者说一个完整的空间等着被线性变换。这时你就可以根据矩阵的特征向量，对应到这些数据向量或者整个空间的某些方向，然后矩阵对这些数据的变换，就相当于沿着这些特征向量进行压或者拉。</p>
<p>另一方面，当你把一个很大矩阵看作向量组的时候，这些特征向量实际代表了数据点集中的位置，即你会发现这些向量组基本集中在某些特征向量指向的轴上。这个时候，我们就可以将整个数据压缩到这些特征向量上来，对数据进行降维。</p>
`,
            imgUrl: "",
            imgDesc: "",
            childIds: ["eigPoly"],
            links: [
                {target:"svd", text:"推广概念"}
            ]
        },
        {
            id:"svd", 
            name:"奇异值分解",

            x:1040, y:440,
            expandDir: "right",

<h4>SVD奇异值分解</h4>
<p>任意矩阵（方阵/非方阵）均可分解 $A=UΣV^T$</p>

<p>弥补非方阵无特征值的缺陷</p>
`,

            imgDesc: "",
            childIds: [],
            links: []
        }
    ],
    allChildNodes: {
        det6: {
            name:"6种性质", 
            desc:"行列式六大初等变换性质：换行变号、数乘提取、分拆、倍加不变等",
            imgUrl: "",
            imgDesc: ""
        },
        detExpand: {
            name:"按行列展开", 
            desc:"代数余子式展开，降阶计算高阶行列式",
            imgUrl: "",
            imgDesc: ""
        },
        matCalc: {
            name:"矩阵运算", 
            desc:"矩阵加减、数乘基础运算规则",
            imgUrl: "",
            imgDesc: ""
        },
        matMultNote: {
            name:"矩阵乘法本质", 
            desc:"矩阵乘法对应线性变换复合，不满足交换律",
            imgUrl: "",
            imgDesc: ""
        },
        matTrans: {
            name:"初等变换", 
            desc:"三类初等行变换，用于化简矩阵、求解方程组",
            imgUrl: "",
            imgDesc: ""
        },
        matInv: {
            name:"矩阵的逆", 
            desc:"仅满秩方阵存在逆矩阵，可逆等价行列式不为0",
            imgUrl: "",
            imgDesc: ""
        },
        rowStep: {
            name:"行阶梯型", 
            desc:"初等行变换化简矩阵，快速判断秩与解结构",
            imgUrl: "",
            imgDesc: ""
        },
        matRank: {
            name:"矩阵的秩", 
            desc:"极大线性无关行/列向量个数，判定方程组有无解",
            imgUrl: "",
            imgDesc: ""
        },
        vecGroup: {
            name:"向量组的秩", 
            desc:"极大线性无关组所含向量个数=矩阵秩",
            imgUrl: "",
            imgDesc: ""
        },
        vecMaxInd: {
            name:"最大无关组", 
            desc:"向量组中线性无关、能表出全部向量的子集",
            imgUrl: "",
            imgDesc: ""
        },
        vecRel: {
            name:"线性相关", 
            desc:"存在不全零系数使线性组合=零向量，向量冗余",
            imgUrl: "",
            imgDesc: ""
        },
        vecSpace: {
            name:"向量空间", 
            desc:"对加法、数乘封闭的向量集合，有基底与维数",
            imgUrl: "",
            imgDesc: ""
        },
        eigPoly: {
            name:"特征多项式", 
            desc:"$|λE-A|$，根即为全部特征值",
            imgUrl: "",
            imgDesc: ""
        }
    }
}

let scale = 1;
let offsetX = 0, offsetY = 0;
let activeExpandMainId = null;
const renderedChildDom = new Map();
const canvas = document.getElementById("canvas");
const svg = document.getElementById("linkSvg");
const detailBox = document.getElementById("detailContent");

// 获取节点圆心+半径
function getNodeCenter(domEl){
    const left = parseFloat(domEl.style.left);
    const top = parseFloat(domEl.style.top);
    const width = domEl.offsetWidth;
    const height = domEl.offsetHeight;
    return {
        x: left + width / 2,
        y: top + height / 2,
        r: width / 2
    };
}

// 计算线段与圆形边缘交点
function getCircleEdgePoint(center, targetX, targetY){
    const dx = targetX - center.x;
    const dy = targetY - center.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if(len === 0) return {x:center.x, y:center.y};
    const ratio = center.r / len;
    return {
        x: center.x + dx * ratio,
        y: center.y + dy * ratio
    };
}

// 图片渲染逻辑：空url不显示图片
function buildDetailContent(nodeData) {
    let content = nodeData.desc || '';
    const imgUrlRaw = nodeData.imgUrl;
    const validImgUrl = !!imgUrlRaw && String(imgUrlRaw).trim() !== "";

    if (validImgUrl) {
        const imgDescRaw = nodeData.imgDesc;
        const cleanDesc = imgDescRaw ? String(imgDescRaw).trim() : "";
        content += `<img src="${imgUrlRaw.trim()}" alt="${cleanDesc}" class="node-img">`;
        if (cleanDesc) {
            content += `<p class="img-desc-text">${cleanDesc}</p>`;
        }
    }
    return content;
}

// 初始化主节点
function initRenderMainNodes(){
    graphData.mainNodes.forEach(mainNode=>{
        const div = document.createElement("div");
        div.className = mainNode.cls;
        div.id = "main-" + mainNode.id;
        div.innerText = mainNode.name;
        div.style.left = mainNode.x + "px";
        div.style.top = mainNode.y + "px";
        canvas.appendChild(div);
        enableDrag(div, mainNode, "main");
        div.onclick = (e)=>{
            e.stopPropagation();
            detailBox.innerHTML = buildDetailContent(mainNode);
            handleMainClick(mainNode.id);
            renderAllLines();
        }
    })
    renderAllLines();
}

// 互斥展开子节点
function handleMainClick(clickMainId){
    if(activeExpandMainId === clickMainId){
        collapseAllChild();
        activeExpandMainId = null;
        return;
    }
    collapseAllChild();
    expandChildNodes(clickMainId);
    activeExpandMainId = clickMainId;
}

// 清空子节点
function collapseAllChild(){
    renderedChildDom.forEach(dom=>dom.remove());
    renderedChildDom.clear();
}

// 定向生成子节点（核心：det/vec使用更大垂直间距）
function expandChildNodes(mainId){
    const mainNode = graphData.mainNodes.find(item=>item.id === mainId);
    const childIdList = mainNode.childIds;
    const childCount = childIdList.length;
    if(childCount === 0) return;
    const dir = mainNode.expandDir;

    // 判断是否为行列式/向量组，使用加大间距
    const isSpecialNode = mainId === "det" || mainId === "vec";
    const rowGapY = isSpecialNode ? CONFIG.SPECIAL_CHILD_GAP_Y : CONFIG.CHILD_GAP_Y;
    // det行列式强制单列一行1个
    const isDetNode = mainId === "det";
    const rowMax = isDetNode ? 1 : CONFIG.MAX_PER_ROW;
    const rowCount = Math.ceil(childCount / rowMax);

    let baseStartX, baseStartY;

    switch(dir){
        case "left":
            // 行列式左侧距离缩小一半
            if(isDetNode){
                baseStartX = mainNode.x - CONFIG.OFFSET_LEFT / 2;
            }else{
                baseStartX = mainNode.x - CONFIG.OFFSET_LEFT;
            }
            const totalW = (rowMax - 1) * CONFIG.CHILD_GAP_X;
            baseStartY = mainNode.y - totalW / 2;
            break;
        case "northwest":
            baseStartX = mainNode.x - CONFIG.OFFSET_NW;
            baseStartY = mainNode.y - CONFIG.OFFSET_NW / 2;
            const totalNW = (rowCount - 1) * rowGapY;
            baseStartX -= totalNW / 2;
            break;
        case "top":
            baseStartY = mainNode.y - CONFIG.OFFSET_TOP;
            const totalH = (rowCount - 1) * rowGapY;
            baseStartX = mainNode.x - totalH / 2;
            break;
        case "bottom":
            // 向量组下方距离减半，横向居中保持正下方
            baseStartY = mainNode.y + CONFIG.OFFSET_BOTTOM / 2;
            const totalHB = (rowCount - 1) * rowGapY;
            baseStartX = mainNode.x - totalHB / 2;
            break;
        case "southeast":
            baseStartX = mainNode.x + CONFIG.OFFSET_SE;
            baseStartY = mainNode.y + CONFIG.OFFSET_SE / 2;
            const totalSE = (rowCount - 1) * rowGapY;
            baseStartX -= totalSE / 2;
            break;
        case "right":
        default:
            baseStartX = mainNode.x + CONFIG.OFFSET_RIGHT;
            const totalR = (rowCount - 1) * rowGapY;
            baseStartY = mainNode.y - totalR / 2;
            break;
    }

    childIdList.forEach((childId, idx)=>{
        const childData = graphData.allChildNodes[childId];
        const rowIndex = Math.floor(idx / rowMax);
        const colIndex = idx % rowMax;
        let childX, childY;

        if(dir === "left" || dir === "right" || dir === "southeast" || dir === "northwest"){
            childX = baseStartX + colIndex * CONFIG.CHILD_GAP_X;
            childY = baseStartY + rowIndex * rowGapY;
        }else{
            childX = baseStartX + colIndex * CONFIG.CHILD_GAP_X;
            childY = baseStartY + rowIndex * rowGapY;
        }

        const div = document.createElement("div");
        div.className = "node-child";
        div.id = "child-" + mainId + "-" + childId;
        div.innerText = childData.name;
        div.style.left = childX + "px";
        div.style.top = childY + "px";
        canvas.appendChild(div);
        enableDrag(div, {x:childX, y:childY}, "child");
        div.onclick = (e)=>{
            e.stopPropagation();
            const childNodeData = {
                desc: `<h4>${childData.name}</h4><p>${childData.desc}</p>`,
                imgUrl: childData.imgUrl,
                imgDesc: childData.imgDesc
            };
            detailBox.innerHTML = buildDetailContent(childNodeData);
        }
        renderedChildDom.set(div.id, div);
    })
}

// 通用拖拽
function enableDrag(dom, data, nodeType){
    let isDrag = false;
    let startClientX, startClientY;
    let startDataX, startDataY;

    dom.onmousedown = (e)=>{
        isDrag = true;
        startClientX = e.clientX;
        startClientY = e.clientY;
        startDataX = data.x;
        startDataY = data.y;
        dom.style.zIndex = 99;
        e.preventDefault();
    }

    document.onmousemove = (e)=>{
        if(!isDrag) return;
        const deltaX = (e.clientX - startClientX) / scale;
        const deltaY = (e.clientY - startClientY) / scale;
        data.x = startDataX + deltaX;
        data.y = startDataY + deltaY;
        dom.style.left = data.x + "px";
        dom.style.top = data.y + "px";
        renderAllLines();
    }

    document.onmouseup = ()=>{
        if(!isDrag) return;
        isDrag = false;
        dom.style.zIndex = nodeType === "main" ? 10 : 8;
    }
}

// 绘制主节点连线
function renderAllLines(){
    svg.innerHTML = "";
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
    marker.setAttribute("id", "arrow");
    marker.setAttribute("markerWidth", "10");
    marker.setAttribute("markerHeight", "7");
    marker.setAttribute("refX", "0");
    marker.setAttribute("refY", "3.5");
    marker.setAttribute("orient", "auto");
    const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    poly.setAttribute("points", "0 0, 10 3.5, 0 7");
    poly.setAttribute("fill", "#445");
    marker.appendChild(poly);
    defs.appendChild(marker);
    svg.appendChild(defs);

    graphData.mainNodes.forEach(mainNode=>{
        const domA = document.getElementById(`main-${mainNode.id}`);
        if(!domA) return;
        const centerA = getNodeCenter(domA);
        mainNode.links.forEach(link=>{
            const target = graphData.mainNodes.find(m=>m.id === link.target);
            const domB = document.getElementById(`main-${target.id}`);
            if(!domB) return;
            const centerB = getNodeCenter(domB);
            const pA = getCircleEdgePoint(centerA, centerB.x, centerB.y);
            const pB = getCircleEdgePoint(centerB, centerA.x, centerA.y);
            drawCurveLine(pA.x, pA.y, pB.x, pB.y, link.text, "#445");
        })
    })
}

// 贝塞尔曲线连线
function drawCurveLine(x1,y1,x2,y2,labelText,stroke){
    const midX = (x1 + x2) / 2;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const d = `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
    path.setAttribute("d", d);
    path.setAttribute("stroke", stroke);
    path.setAttribute("stroke-width", "1.2");
    path.setAttribute("fill", "none");
    path.setAttribute("marker-end", "url(#arrow)");
    svg.appendChild(path);
    if(labelText){
        const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
        const tx = midX;
        const ty = (y1 + y2) / 2;
        textEl.setAttribute("x", tx);
        textEl.setAttribute("y", ty);
        textEl.setAttribute("font-size", "11");
        textEl.setAttribute("fill", "#222");
        textEl.textContent = labelText;
        svg.appendChild(textEl);
    }
}

// 画布滚轮缩放
canvas.onwheel = (e)=>{
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    scale = Math.max(0.4, Math.min(2.2, scale * delta));
    canvas.style.transform = `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
    svg.style.transform = `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
}

// 画布平移
let dragCanvas = false;
let canvasStartX, canvasStartY;
canvas.onmousedown = (e)=>{
    if(e.target === canvas || e.target === svg){
        dragCanvas = true;
        canvasStartX = e.clientX;
        canvasStartY = e.clientY;
    }
}
document.onmousemove = (e)=>{
    if(!dragCanvas) return;
    offsetX += e.clientX - canvasStartX;
    offsetY += e.clientY - canvasStartY;
    canvasStartX = e.clientX;
    canvasStartY = e.clientY;
    canvas.style.transform = `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
    svg.style.transform = `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
}
document.onmouseup = ()=> dragCanvas = false;

window.onload = initRenderMainNodes;
</script>
</body>
</html>
